name: CI/CD Pipeline

# This tells GitHub to run this script whenever code is pushed to the main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      DEFAULT_RATE_LIMIT_MAX_REQUESTS: ${{ secrets.DEFAULT_RATE_LIMIT_MAX_REQUESTS }}
      DEFAULT_RATE_LIMIT_WINDOW_SECONDS: ${{ secrets.DEFAULT_RATE_LIMIT_WINDOW_SECONDS }}


    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and Start services
        run: docker compose up --build -d

      - name: Wait for databases to initialize
        # A simple pause to give Mongo and Redis time to boot up completely
        run: sleep 15 

      - name: Run Unit Tests & Integration Tests
        # The -T flag is critical here for CI environments!
        run: |
          docker compose exec -T app python -m pytest tests/
          docker compose exec -T app python -m pytest tests/integration/test_api.py
        

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and Push Docker image
        # This uploads your finished, tested image to the internet
        run: |
          docker tag ratelimit-service-app:latest ${{ secrets.DOCKER_USERNAME }}/my-ratelimit-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/my-ratelimit-service:latest

      - name: Stop services
        run: docker compose down