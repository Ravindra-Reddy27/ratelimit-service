services:
  # 1. Our FastAPI Application
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - DEFAULT_RATE_LIMIT_MAX_REQUESTS=${DEFAULT_RATE_LIMIT_MAX_REQUESTS}
      - DEFAULT_RATE_LIMIT_WINDOW_SECONDS=${DEFAULT_RATE_LIMIT_WINDOW_SECONDS}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    # --- FIX 3: App Healthcheck ---
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 2. Our Fast Memory (Redis)
  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Our Permanent Storage (MongoDB)
  mongo:
    image: mongo:4.4
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ratelimitdb
    volumes:
      - mongo_data:/data/db
      - ./init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data: